services:
  db:
    image: postgres:16-alpine
    container_name: diacare-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: diacare
      POSTGRES_USER: diacare
      POSTGRES_PASSWORD: diacare123
    ports:
      - "5432:5432"
    volumes:
      - diacare-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diacare -d diacare"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./DiaCare
    container_name: diacare-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/diacare
      SPRING_DATASOURCE_USERNAME: diacare
      SPRING_DATASOURCE_PASSWORD: diacare123
      MAIL_HOST: localhost
      MAIL_PORT: 1025
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      JWT_SECRET: change-this-secret-for-local-development
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "8085:8085"

  frontend:
    build:
      context: ./DiaCareFrontend
      args:
        VITE_API_URL: http://localhost:8085/api/v1
    container_name: diacare-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  diacare-db-data:
